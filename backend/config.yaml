  default: "qwen2.5-coder-1.5b"

  embeddings:
    model: "sentence-transformers/all-MiniLM-L6-v2"
    dimension: 384

rag:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5
  supported_extensions:
    - ".py"
    - ".js"
    - ".ts"
    - ".tsx"
    - ".jsx"
    - ".java"
    - ".cpp"
    - ".c"
    - ".h"
    - ".hpp"
    - ".cs"
    - ".go"
    - ".rs"
    - ".rb"
    - ".php"
    - ".swift"
    - ".kt"
    - ".scala"
    - ".vue"
    - ".svelte"
    - ".html"
    - ".css"
    - ".scss"
    - ".sql"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".toml"
    - ".md"
    - ".txt"
    - ".sh"
    - ".bat"
    - ".dockerfile"
    - ".xml"
    - ".proto"
    - ".graphql"

  ignore_patterns:
    - "node_modules"
    - ".git"
    - "__pycache__"
    - ".venv"
    - "venv"
    - "dist"
    - "build"
    - ".next"
    - "target"
    - "*.min.js"
    - "*.min.css"
    - "package-lock.json"
    - "yarn.lock"
    - "*.pyc"
    - ".DS_Store"
    - "*.lock"

fine_tuning:
  # LoRA / QLoRA params
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  # Training
  learning_rate: 2.0e-4
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 1024
  warmup_ratio: 0.03
  # Data extraction strategies
  strategies:
    - "docstring_to_impl"   # docstring/JSDoc → implementation
    - "comment_to_code"     # comment → following code block
    - "file_completion"     # prefix → suffix (file-level)
    - "function_signature"  # signature → body
    - "test_to_impl"        # test → implementation
  # Minimum examples to start training
  min_examples: 10
  # Output adapter directory
  adapter_dir: "models/adapters"

generation:
  max_new_tokens: 2048
  temperature: 0.2
  top_p: 0.95
  top_k: 50
  repetition_penalty: 1.1
  do_sample: true